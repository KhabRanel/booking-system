services:
  postgres:
    image: 'postgres:17'
    environment:
      - 'POSTGRES_DB=booking_db'
      - 'POSTGRES_PASSWORD=booking_pass'
      - 'POSTGRES_USER=booking_user'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: 'redis:7'
    ports:
      - '6379:6379'

volumes:
  postgres_data:
